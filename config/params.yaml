# ============================================================
#  trash_robot_sim — параметры узлов
#  Загружаются через gazebo.launch.py и передаются нодам.
# ============================================================

# ── Навигатор (astar_navigator) ──────────────────────────────
astar_navigator:
  ros__parameters:

    # Расстояние между строками зигзага (boustrophedon), метры.
    # Должно быть ≈ ширине обзора камеры, чтобы не пропустить объекты.
    # Примечание: inflation в коде = 1.1м (полудиагональ тела 0.72м + запас 0.38м).
    row_spacing: 2.5

    # Отступ от краёв области сканирования, метры.
    # Предотвращает столкновение со стенами при навигации по краям.
    area_margin: 0.8

    # Максимальные скорости робота
    max_linear_velocity: 0.65   # м/с
    max_angular_velocity: 0.9   # рад/с

    # Радиус, в котором цель считается достигнутой, метры.
    goal_radius: 0.90

    # Таймаут на достижение одной точки покрытия, секунды.
    # По истечении — точка пропускается.
    goal_timeout: 120.0

    # Параметры Pure Pursuit
    lookahead: 1.5        # дальность точки упреждения, метры
    waypoint_radius: 0.50 # радиус принятия промежуточной точки пути, метры

    # Мировые координаты центра тела робота при спавне.
    # Нужны для коррекции odom-смещения (DiffDrive стартует с odom=(0,0)).
    # Тело = model_pose + body_offset: (-0.5 + 0.5, -2.0) = (0.0, -2.0)
    spawn_x: 0.0
    spawn_y: -2.0


# ── Построитель карты + детектор мусора (map_builder) ────────
map_builder:
  ros__parameters:

    # Минимальная доля пикселей ROI совпавшего цвета для детекции объекта.
    # Объект 0.35м на расстоянии 1.5м даёт ~2-5% пикселей в ROI.
    # 0.005 = 0.5% — уверенная детекция при нормальном освещении без лишних false positives.
    detect_threshold: 0.005

    # Дистанция объединения: два обнаружения ближе этого расстояния
    # считаются одним и тем же объектом, метры.
    merge_distance: 2.5

    # Минимальная валидная дальность лидара, метры.
    # Корпус робота 1.2×0.8м: полудиагональ = 0.72м.
    # 0.85м > 0.72м — надёжно отсекает саморефлексию от углов корпуса.
    lidar_min_valid: 0.85

    # Мировые координаты центра тела робота при спавне (для коррекции odom-смещения).
    spawn_x: 0.0
    spawn_y: -2.0
